<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive CSS Grid Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>Responsive CSS Grid Examples</h1>

    <section>
        <h2>1. Fixed 4 Columns</h2>
        <div class="grid fixed">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
            <div>8</div>
        </div>
    </section>

    <section>
        <h2>2. repeat(4,1fr)</h2>
        <div class="grid repeat">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
            <div>8</div>
        </div>
    </section>

    <section>
        <h2>3. minmax()</h2>
        <div class="grid minmax">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
            <div>8</div>
        </div>
    </section>

    <section>
        <h2>4. auto-fit</h2>
        <div class="grid autofit">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
            <div>8</div>
        </div>
    </section>

    <section>
        <h2>5. auto-fill</h2>
        <div class="grid autofill">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
            <div>8</div>
        </div>
    </section>

    <section>
        <h2>6. Percentage Columns</h2>
        <div class="grid percent">
            <div>20%</div>
            <div>30%</div>
            <div>50%</div>
        </div>
    </section>

    <section>
        <h2>7. Mixed Layout</h2>
        <div class="grid mixed">
            <div>Sidebar</div>
            <div>Main Content</div>
            <div>Ads</div>
        </div>
    </section>

</body>

</html>
